name: Deploy to EC2
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd daivo-ai-support
          git pull origin main
          docker build -t ai-support .
          docker stop ai-support || true
          docker rm ai-support || true
          docker run -dp 8501:8501 --env-file .env ai-support01~
